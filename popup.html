<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 380px;
      padding: 24px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(90deg, #00ff88, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    
    .subtitle {
      font-size: 12px;
      color: #666;
    }
    
    .site-badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 20px;
      font-size: 13px;
      color: #00ff88;
      margin-bottom: 20px;
    }
    
    .toggle-btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .toggle-btn.off {
      background: linear-gradient(135deg, #2a2a3a 0%, #1a1a2a 100%);
      color: #666;
      border: 2px solid #333;
    }
    
    .toggle-btn.on {
      background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
      color: #000;
      box-shadow: 0 8px 32px rgba(0, 255, 136, 0.4);
    }
    
    .toggle-btn:hover {
      transform: translateY(-2px);
    }
    
    .modes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .mode-btn {
      padding: 12px 8px;
      border: 2px solid #2a2a3a;
      background: #1a1a2a;
      color: #888;
      border-radius: 10px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s ease;
      text-align: center;
    }
    
    .mode-btn:hover {
      border-color: #444;
      color: #fff;
    }
    
    .mode-btn.active {
      background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
      color: #000;
      border-color: transparent;
    }
    
    .mode-btn span {
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
    }
    
    .settings {
      background: #1a1a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    
    .setting-row:last-child {
      margin-bottom: 0;
    }
    
    .setting-row label {
      font-size: 13px;
      color: #888;
    }
    
    .setting-row input {
      width: 100px;
      padding: 8px 12px;
      background: #0a0a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #00ff88;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }
    
    .setting-row input:focus {
      outline: none;
      border-color: #00ff88;
    }
    
    .save-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 255, 136, 0.3);
    }
    
    .hotkeys {
      margin-top: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
    }
    
    .hotkeys-title {
      font-size: 11px;
      color: #555;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .hotkey {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin: 4px;
    }
    
    .key {
      padding: 4px 8px;
      background: #2a2a3a;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      color: #00ff88;
    }
    
    .hotkey-label {
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ TYPING GOD</div>
    <div class="subtitle">MonkeyType</div>
  </div>

  <div class="site-badge" id="site">Detecting...</div>

  <button id="toggleBtn" class="toggle-btn off">ACTIVATE</button>

  <div class="modes">
    <button class="mode-btn" data-mode="god">
      <span>🔥</span>GOD<br>150 WPM
    </button>
    <button class="mode-btn" data-mode="nine">
      <span>💎</span>999+<br>120 WPM
    </button>
    <button class="mode-btn" data-mode="human">
      <span>👤</span>HUMAN<br>80 WPM
    </button>
    <button class="mode-btn active" data-mode="custom">
      <span>⚙️</span>CUSTOM
    </button>
  </div>

  <div class="settings">
    <div class="setting-row">
      <label>WPM / Очков</label>
      <input type="number" id="wpm" value="120" min="50" max="500">
    </div>
    <div class="setting-row">
      <label>Accuracy %</label>
      <input type="number" id="acc" value="98" min="50" max="100" step="0.5">
    </div>
    <div class="setting-row">
      <label>Consistency %</label>
      <input type="number" id="consistency" value="80" min="74" max="85" step="1">
    </div>
  </div>

  <button class="save-btn" id="saveBtn">💾 SAVE</button>

  <div class="hotkeys">
    <div class="hotkeys-title">Hotkeys</div>
    <div class="hotkey"><span class="key">Alt+1</span><span class="hotkey-label">GOD</span></div>
    <div class="hotkey"><span class="key">Alt+2</span><span class="hotkey-label">999+</span></div>
    <div class="hotkey"><span class="key">Alt+3</span><span class="hotkey-label">HUMAN</span></div>
    <div class="hotkey"><span class="key">Alt+4</span><span class="hotkey-label">CUSTOM</span></div>
    <div class="hotkey"><span class="key">Alt+0</span><span class="hotkey-label">STOP</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
